name: Build release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build Windows release ZIP
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          .\scripts\build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobIntel-Windows
          path: dist/releases/JobIntel-Windows.zip
          if-no-files-found: error

  build-macos-intel:
    name: Build macOS Intel ZIP
    runs-on: macos-13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build macOS Intel release ZIP
        shell: bash
        env:
          JOB_INTEL_RELEASE_NAME: JobIntel-macOS-Intel
        run: bash ./scripts/build_macos.sh

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobIntel-macOS-Intel
          path: dist/releases/JobIntel-macOS-Intel.zip
          if-no-files-found: error

  build-macos-apple-silicon:
    name: Build macOS Apple Silicon ZIP
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build macOS Apple Silicon release ZIP
        shell: bash
        env:
          JOB_INTEL_RELEASE_NAME: JobIntel-macOS-AppleSilicon
        run: bash ./scripts/build_macos.sh

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobIntel-macOS-AppleSilicon
          path: dist/releases/JobIntel-macOS-AppleSilicon.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos-intel
      - build-macos-apple-silicon
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
