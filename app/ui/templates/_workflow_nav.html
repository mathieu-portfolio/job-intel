<nav class="workflow-nav" aria-label="Offer workflow">
  <div class="workflow-nav-links">
    <a class="{% if active_page == 'offers' %}active{% endif %}" href="/offers">Offers</a>
    <a class="{% if active_page == 'ai_reviewed' %}active{% endif %}" href="/ai-reviewed">AI Reviewed</a>
    <a class="{% if active_page == 'maintenance' %}active{% endif %}" href="/maintenance">Maintenance</a>
  </div>
  <div class="workflow-context">
    <form class="active-profile-form" method="post" action="/settings/profile">
      <input type="hidden" name="redirect_to" value="{{ request.url.path }}{% if request.url.query %}?{{ request.url.query }}{% endif %}">
      <span class="profile-picker-label">Active profile</span>
      <details class="profile-picker">
        <summary title="{{ active_profile.label }}">{{ active_profile.label }}</summary>
        <div class="profile-picker-menu" role="menu">
          {% for profile in profiles %}
            <button type="submit" name="active_profile" value="{{ profile.value }}" class="profile-picker-option{% if active_profile.value == profile.value %} active{% endif %}" role="menuitem">{{ profile.label }}</button>
          {% endfor %}
        </div>
      </details>
    </form>
    {% if workflow_count_label is defined %}<div class="count">{{ workflow_count_label }}</div>{% endif %}
  </div>
</nav>
